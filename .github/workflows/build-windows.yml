name: Build Windows EXE

# Produces dist/YapbozAsistani.exe on a Windows runner (PyInstaller cannot
# cross-compile from Linux, so the build must run on Windows). Trigger it
# manually from the Actions tab ("Run workflow"), or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy opencv-python scipy mss Pillow pynput pywin32 win10toast pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name YapbozAsistani --paths . --collect-submodules pynput --collect-all win10toast --hidden-import win32gui --hidden-import win32con --noconfirm puzzle_assistant/gui.py

      - name: Stage release files
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/YapbozAsistani.exe release/
          Copy-Item KULLANIM.txt release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YapbozAsistani-windows
          path: release/
          if-no-files-found: error
